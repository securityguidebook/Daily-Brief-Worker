name = "daily-brief-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# ── KV Namespace ─────────────────────────────────────────────────
# Run: npx wrangler kv:namespace create BRIEF_CACHE
# Then replace the id below with the one it gives you.
[[kv_namespaces]]
binding = "BRIEF_CACHE"
id = "1b1bfe3495b247689bc0e7c415b62579"

# ── Cron Triggers ────────────────────────────────────────────────
# NZT = UTC+12
# 6AM  NZT = 18:00 UTC (previous calendar day)
# 5PM  NZT = 05:00 UTC
[triggers]
crons = ["0 18 * * *", "0 5 * * *"]

# ── Environment Variables ─────────────────────────────────────────
# Set secrets via CLI (never commit these):
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put ALLOWED_ORIGIN
#
# ALLOWED_ORIGIN example: https://securityguidebook.github.io
